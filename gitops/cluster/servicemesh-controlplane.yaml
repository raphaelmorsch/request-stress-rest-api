apiVersion: maistra.io/v2
kind: ServiceMeshControlPlane
metadata:
  name: basic
  namespace: istio-system
spec:
  version: v2.6
  tracing:
    type: None
  policy:
    type: Istiod
  telemetry:
    type: Istiod
  addons:
    grafana:
      enabled: true
    jaeger:
      install: {}
    kiali:
      enabled: true
    prometheus:
      enabled: true
  runtime:
    components:
      pilot:
        container:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: maistra.io/v1
kind: ServiceMeshMemberRoll
metadata:
  name: default
  namespace: istio-system
spec:
  members:
    - mercantil-mesh
