# T22 — versão quebrada (readiness falha → rollback via GitOps)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-stress
  namespace: mercantil-mesh
  labels:
    app: request-stress
    version: v2-broken
  annotations:
    mercantil.io/test-case: T22
    mercantil.io/scenario: broken-release
spec:
  replicas: 2
  selector:
    matchLabels:
      app: request-stress
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: request-stress
        version: v2
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: request-stress
          # Imagem inexistente / tag broken força ImagePullBackOff ou
          # use o comando de falha abaixo se a imagem existir.
          image: image-registry.openshift-image-registry.svc:5000/mercantil-mesh/request-stress:v2-broken
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: v2-broken
            # Força falha de readiness se a imagem v2-broken for um build válido com HEALTH_FAIL
            - name: HEALTH_FAIL
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/stress/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/stress/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
