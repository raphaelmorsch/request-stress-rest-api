# T25 — canary: header x-canary → v2; demais requests 90% v1 / 10% v2
# Stable = host request-stress (Deployment atual); canary = host request-stress-v2.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: request-stress
  namespace: mercantil-mesh
  annotations:
    mercantil.io/test-case: T25
    mercantil.io/scenario: canary-deployment
spec:
  hosts:
    - request-stress.mercantil-mesh.svc.cluster.local
  http:
    - name: canary-header
      match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: request-stress-v2.mercantil-mesh.svc.cluster.local
            subset: v2
            port:
              number: 3000
    - name: canary-weighted
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure,refused-stream
      timeout: 8s
      route:
        - destination:
            host: request-stress.mercantil-mesh.svc.cluster.local
            port:
              number: 3000
          weight: 90
        - destination:
            host: request-stress-v2.mercantil-mesh.svc.cluster.local
            subset: v2
            port:
              number: 3000
          weight: 10
