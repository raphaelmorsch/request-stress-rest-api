apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# T25 — canary deployment via Service Mesh (subsets v1/v2 + pesos no VirtualService)
# Pré-req: tag de imagem request-stress:v2 (ver bootstrap / T21)
resources:
  - ../../base
  - deployment-v2.yaml

patches:
  - path: virtualservice-canary.yaml
    target:
      group: networking.istio.io
      version: v1beta1
      kind: VirtualService
      name: request-stress
