# T25 — canary: workload paralelo (Service próprio; VS faz o split de tráfego)
# Não reutiliza o Deployment request-stress: o selector dele é só app=request-stress
# (T21 rolling no mesmo Deployment). Dois Deployments com esse selector conflitariam.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-stress-v2
  namespace: mercantil-mesh
  labels:
    app: request-stress-v2
    version: v2
    app.kubernetes.io/part-of: request-stress-poc
  annotations:
    mercantil.io/test-case: T25
    mercantil.io/scenario: canary-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-stress-v2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: request-stress-v2
        version: v2
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: request-stress
          image: image-registry.openshift-image-registry.svc:5000/mercantil-mesh/request-stress:v2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: v2
          readinessProbe:
            httpGet:
              path: /api/stress/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/stress/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: request-stress-v2
  namespace: mercantil-mesh
  labels:
    app: request-stress-v2
    version: v2
    app.kubernetes.io/part-of: request-stress-poc
  annotations:
    mercantil.io/test-case: T25
spec:
  selector:
    app: request-stress-v2
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: request-stress-v2
  namespace: mercantil-mesh
  labels:
    app: request-stress-v2
  annotations:
    mercantil.io/test-case: T25
spec:
  host: request-stress-v2.mercantil-mesh.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 20
  subsets:
    - name: v2
      labels:
        version: v2
