apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: configmap-endpoint.yaml
    target:
      version: v1
      kind: ConfigMap
      name: request-stress-client-config
  - path: rollout-annotation.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: request-stress-client
