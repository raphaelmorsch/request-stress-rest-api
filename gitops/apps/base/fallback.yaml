apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-stress-fallback
  namespace: mercantil-mesh
  labels:
    app: request-stress-fallback
    version: v1
    app.kubernetes.io/part-of: request-stress-poc
  annotations:
    mercantil.io/test-case: T19
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-stress-fallback
  template:
    metadata:
      labels:
        app: request-stress-fallback
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: request-stress-fallback
          image: image-registry.openshift-image-registry.svc:5000/mercantil-mesh/request-stress-fallback:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5001
          env:
            - name: PORT
              value: "5001"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: request-stress-fallback
  namespace: mercantil-mesh
  labels:
    app: request-stress-fallback
    app.kubernetes.io/part-of: request-stress-poc
spec:
  selector:
    app: request-stress-fallback
  ports:
    - name: http
      port: 5001
      targetPort: http
