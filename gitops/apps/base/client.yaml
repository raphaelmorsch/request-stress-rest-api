apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-stress-client
  namespace: mercantil-mesh
  labels:
    app: request-stress-client
    version: v1
    app.kubernetes.io/part-of: request-stress-poc
  annotations:
    mercantil.io/test-cases: T09,T19
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-stress-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: request-stress-client
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: request-stress-client
          image: image-registry.openshift-image-registry.svc:5000/mercantil-mesh/request-stress-client:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: request-stress-client-config
                  key: BACKEND_URL
            - name: BACKEND_URL_EXTERNAL
              valueFrom:
                configMapKeyRef:
                  name: request-stress-client-config
                  key: BACKEND_URL_EXTERNAL
            - name: FALLBACK_URL
              valueFrom:
                configMapKeyRef:
                  name: request-stress-client-config
                  key: FALLBACK_URL
            - name: FALLBACK_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: request-stress-client-config
                  key: FALLBACK_ENABLED
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: request-stress-client
  namespace: mercantil-mesh
  labels:
    app: request-stress-client
    app.kubernetes.io/part-of: request-stress-poc
spec:
  selector:
    app: request-stress-client
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: request-stress-client
  namespace: mercantil-mesh
  labels:
    app: request-stress-client
spec:
  to:
    kind: Service
    name: request-stress-client
  port:
    targetPort: http
  wildcardPolicy: None
